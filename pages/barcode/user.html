<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>תוכנית הברקודים</title>
</head>

<body onload="onLoad()">
  <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link href="../../styleSheets/userStyleSheet.css" rel="stylesheet" />
  <link href="../../styleSheets/mainStyleSheet.css" rel="stylesheet" />
  <script src="../../js/jquery.min.js"></script>
  <script src="../../node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
  <script src="../../js/shared.js"></script>

  <script>
    var students = ""
    var uniqTasks = ""
    var systemConfig = ""
    var searchVal = ""
    var buffer = "";
    var step
    var currentStudent 
    var currentTask 
    var fileName
    var tableName
    const Steps = {
      step1: "1",
      step2: "2",
      step3: "3"
    };

    function onLoad() {
      step = Steps.step1;
      updateLines("!...שלום", "יש לתקף את הכרטיס האישי בסורק הברקוד")
      tableName = 'systemConfig'
      window.expose.SendExcel("sendReadSystem", tableName);
      window.expose.ReceiveExcel("receiveReadSystem" + tableName, (data) => {
        systemConfig = data
        document.getElementById("position").style.backgroundColor = getPosition(systemConfig.color)[0]
        document.getElementById("position").style.color = getPosition(systemConfig.color)[1]

        document.getElementById("background").style.backgroundImage = getBackground(systemConfig.device, systemConfig.color, step)
        document.querySelector(".text").style.color = getTextColor(systemConfig.textColor);

        if (systemConfig.numPosition.length > 0) {
          document.getElementById("position").innerHTML += ' ' + systemConfig.numPosition
        }
        else {
          document.getElementById("position").style.display = "none";
        }
      })
    }

    document.addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        if (buffer.length > 0) {
          searchVal = buffer;
          buffer = "";
          if (step == Steps.step1) {
            if (searchVal == '999999999')
              login('../main/manage')
            else if (searchVal == '011429519')
              login('../main/system')
            else if (searchVal == '207594581')
              login('../parentsMeeting/user')
            else
              searchStudent();//בת
          }
          else if (step == Steps.step2) {
            //משימה רגילה--כללית
            searchTask();
          }
        }
      } else {
        buffer += e.key;
      }
    });

    function searchStudent() {
      step = Steps.step2
      window.expose.sendDbData("sendGetStudentById", searchVal);
      window.expose.receiveDbData("receiveGetStudentById", (student) => {
        currentStudent = student
        
        if (currentStudent == null) {
          showAlert("הברקוד לא מופיע ברשימות. גשו למורה!")
          return;
        }
      document.getElementById("background").style.backgroundImage = getBackground(systemConfig.device, systemConfig.color, step)
      updateLines("(: שלום  " + currentStudent.name, "יש לסרוק את הברקוד לעדכון משימה", "עד כה צברת " + currentStudent.points + " נקודות")
      });
    }

    function searchTask() {
      step = Steps.step3;

      window.expose.sendDbData("sendGetTaskByCode", searchVal);
      window.expose.receiveDbData("receiveGetTaskByCode", (task) => {
        if (!task) {
          showAlert("קוד לא תקין, גשו למורה!");
          return;
        }
        currentTask=task

        if (systemConfig.type === 1) {
          window.expose.sendDbData("sendIsTaskUsed", {currentTask});
          window.expose.receiveDbData("receiveIsTaskUsed", (used) => {
            if (used) {
              showAlert("הי, משימה זו כבר תוקפה!");
              return;
            }
            saveStudentData();
          });
        }

        else {
          if (!currentTask.multiple) {
            window.expose.sendDbData("sendHasStudentDoneTask", { currentStudent, currentTask });
            window.expose.receiveDbData("receiveHasStudentDoneTask", (alreadyDone) => {
              if (alreadyDone) {
                showAlert("הי, אסור להגיש משימה פעמיים!");
                return;
              }
              saveStudentData();
            });
          }
        }
      });
    }

async function saveStudentData() {

    window.expose.sendDbData("sendSaveStudentData", { currentStudent, currentTask });
    window.expose.receiveDbData("receiveSaveStudentData", (points) => {
      if (points !== false) {
        document.getElementById("background").style.backgroundImage = getBackground(systemConfig.device, systemConfig.color, step); 
        currentStudent.points = points;
        updateLines("ביצעת את משימה " + currentTask.name, "כעת יש בחשבונך " + currentStudent.points + " נקודות", "...לא לשכוח לקחת את האישור מהמדפסת");

        if (systemConfig.hasPrint == 1) {
          setTimeout(function () {
            toPrint();
          }, 2000);
        } else {
          reset(2000);
        }
      } else {
        console.error("שגיאה: השמירה במסד הנתונים נכשלה.");
      }
    });
  
}
    


    function toPrint() {
      const dynamicHTML = `
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="utf-8" />
            <title>Print</title>
            <style>
                body {
                    font-family: 'Arial', sans-serif;;
                    direction: rtl;
                    margin: 0;
                    padding: 0;
                }
                #title {
                    font-size: 40px;
                    text-align: center;
                }
                #content div {
                    font-size: 20px;
                    margin: 10px 0;
                }
                #footer {
                    font-size: 10px;
                    text-align: center;
                    margin-top: 20px;
                }
            </style>
        </head>
        <body>
            <div id="title">אישור</div>
            <br>
            <div id="content">
                <div>${currentStudent.name}</div>
                <div>${currentStudent.grade}</div>
                <div>${systemConfig.buy == 0
          ? "משימה: " + currentTask.name
          : "זכאות למתנה: " + currentTask.name}</div>
                <div>נקודות בחשבון: ${currentStudent.points}</div>
            </div>
            <br>
            <div id="title">בהצלחה!</div>
            <br>
            <br>
            <div id="footer">להזמנות: אפרת מלכה 0504167969 office@gammick.co.il</div>
        </body>
        </html>
    `;
      window.expose.send("sendPrint", dynamicHTML);
      window.expose.receive("receivePrint", () => {
        reset(1800);
      });
    }

    function reset(time = 0) {
      setTimeout(function () {
        location.reload();
      }, time);
    }

    function updateLines(line1Text, line2Text, line3Text = "") {
      document.getElementById("line1").innerHTML = line1Text;
      document.getElementById("line2").innerHTML = line2Text;
      document.getElementById("line3").innerHTML = line3Text;
    }

    function showAlert(message) {
      document.querySelector(".modal-body").innerHTML = message;
      $(document).ready(function () {
        $('#modal').modal('show')
      });
      setTimeout(function () {
        $(document).ready(function () {
          $('#modal').modal('hide')
        });
        reset(0)
      }
        , 2500);
    }

  </script>

  <div class="background" id="background">
    <div class="text">
      <div id="line1"></div>
      <div id="line2"></div>
      <div id="line3"></div>
      <br><br>
    </div>
    <div id="position">עמדה</div>
  </div>
  <div class="modal fade" id="modal" tabindex="-1" role="dialog" aria-labelledby="modalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalLabel">הודעת מערכת</h5>
        </div>
        <div class="modal-body"></div>
      </div>
    </div>
  </div>
</body>

</html>
