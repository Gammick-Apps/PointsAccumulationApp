<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>ממשק ניהול</title>
</head>

<body onload="onLoad()">
    <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link href="../../styleSheets/dailyActivationManageStyleSheet.css" rel="stylesheet" />
    <link href="../../styleSheets/mainStyleSheet.css" rel="stylesheet" />
    <script src="../../js/jquery.min.js"></script>
    <script src="../../node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
    <script src="../../js/shared.js"></script>

    <script>
        var systemConfig = "";
        var fileName
        var searchVal = ""

        function onLoad() {
            fileName = 'systemConfig'
            window.expose.SendExcel("sendReadExcel", fileName);
            window.expose.ReceiveExcel("receiveReadExcel" + fileName, (data) => {
                if (data == 0) {
                    systemConfig = getDefaultConfig()
                }
                else {
                    systemConfig = JSON.parse(data)
                }
                document.getElementById("background").style.backgroundImage = getBackground(systemConfig.device, systemConfig.color);
                document.querySelector(".text").style.color = getTextColor(systemConfig.textColor);
            });
        }

        document.addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                if (searchVal.length > 0) {
                    if (searchVal == '999999999')
                        login("./classPoints")
                    if (searchVal == '011429519')
                        login("../main/system")
                }
            } else {
                searchVal += e.key;
            }
        });

        function resetPoints() {
            var classesPoints = JSON.parse(localStorage.getItem("classesPoints"));
            if (classesPoints != null) {
                classesPoints.forEach(function (element) {
                    element.points = 0;
                });
                localStorage.setItem("classesPoints", JSON.stringify(classesPoints));
                alert("הנקודות אופסו בהצלחה!");
            }
        }
    </script>

    <div class="background" id="background">
        <div class="closeBtn">
            <img onclick="expose.appClose()" src="../../resources/barcode/x-light.svg" />
        </div>
        <div class="text">
            <div id="line1">ברוכים הבאים לממשק ניהול</div>
            <br>
            <br>
            <button onclick="resetPoints()" class="action-btn">איפוס נקודות</button>
        </div>
    </div>
</body>

</html>
