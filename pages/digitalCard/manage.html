<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>ממשק ניהול</title>
</head>

<body onload="onLoad()">
    <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link href="../../styleSheets/digitalManageStyleSheet.css" rel="stylesheet" />
    <link href="../../styleSheets/mainStyleSheet.css" rel="stylesheet" />
    <script src="../../js/ag-grid-community.min.js"></script>
    <script src="../../js/jquery.min.js"></script>
    <script src="../../node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
    <script src="../../js/shared.js"></script>

    <script>
        var systemConfig = "";
        var products = "";
        var tableName
        var currentDate = getTodayDate();
        var searchVal=""

        var getV = function (params) {
            return params.data.used == 1 ? "V" : ""
        };
        var gridOptions
        var columnDefs = [
            { headerName: "שם", field: "name", editable: true },
            { headerName: "קוד", field: "code", editable: true },
            {
                headerName: "האם שומש", valueGetter: getV,
            },
        ];

        function onLoad() {
            tableName = 'systemConfig'
            window.expose.SendSystem("sendReadSystem", tableName);
            window.expose.ReceiveSystem("receiveReadSystem" + tableName, (data) => {
                systemConfig = JSON.parse(data)
                document.getElementById("background").style.backgroundImage = getBackground(systemConfig.device, systemConfig.color);
            });
            tableName = 'products'
            window.expose.sendDbData("sendGetDataByTable", tableName);
            window.expose.receiveDbData("receiveGetDataByTable" + tableName, (data) => {
                if (data != 0) {
                    products = JSON.parse(data)
                    gridOptions = {
                        columnDefs: columnDefs,
                        rowData: products,
                        enableRtl: true,
                        defaultColDef: {
                            filter: 'agTextColumnFilter',
                            filterParams: {
                                suppressAndOrCondition: true
                            },
                            sortable: true,
                        },
                        onFirstDataRendered: onFirstDataRendered,
                        onCellEditingStopped: updateProduct(params)
                    };
                    var gridDiv = document.querySelector('#productsGrid');
                    new agGrid.Grid(gridDiv, gridOptions);
                }
            });
        }

        document.addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                if (searchVal.length > 0) {
                    if (searchVal == '999999999')
                        login("../main/user")
                    if (searchVal == '011429519')
                        login("../main/system")
                }
            } else {
                searchVal += e.key;
            }
        });

        function addProduct() {
            window.expose.sendDbData("sendInsertProduct");
            window.expose.receiveDbData("receiveInsertProduct", (data) => {
                if (data === true) {
                    location.reload();
                }
            });
        }
        function onFirstDataRendered(params) {
            gridOptions.api.sizeColumnsToFit({
                defaultMaxWidth: 180
            });
        }

        function updateProduct(params) {
            const payload = {
                code: params.data.code,
                field: params.colDef.field,
                value: params.newValue
            };
            window.expose.sendDbData("sendUpdateProduct", JSON.stringify(payload));
            window.expose.receiveDbData("receiveUpdateProduct", (data) => {
                if (data === true) {
                    location.reload()
                }
            });
        }

    </script>
    <div class="background" id="background">
        <div class="closeBtn">
            <img onclick="expose.appClose()" src="../../resources/barcode/x-light.svg" />
        </div>
        <div class="text">
            <div id="line1">ברוכים הבאים הבאה לממשק ניהול</div>
            <div id="line2">כאן אפשר להוסיף ולשנות מתנות</div>
            <br>
            <img style="margin-left: 10px;" onclick="addProduct()" src="../../resources/barcode/plus-light.svg" />
            <div id="productsGrid" style="width:100%" class="ag-theme-alpine"></div>
        </div>
    </div>
</body>

</html>
