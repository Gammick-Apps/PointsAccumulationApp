<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>צבירת נקודות</title>
</head>

<body onload="onLoad()">
    <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link href="../../styleSheets/cardUserStyleSheet.css" rel="stylesheet" />
    <link href="../../styleSheets/mainStyleSheet.css" rel="stylesheet" />
    <script src="../../js/jquery.min.js"></script>
    <script src="../../node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
    <script src="../../js/shared.js"></script>

    <div class="background" id="background">
        <div class="text">
            <div id="line1"></div>
            <div id="line2"></div>
            <div id="line3"></div>
            <br>
            <br>
            <div class="row row-cols-md-5 g-3 pb-2 justify-content-md-center" id="cards">
            </div>
        </div>
        <div id="position">עמדה</div>
    </div>
    <div class="modal fade" id="modal" tabindex="-1" role="dialog" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalLabel">הודעת מערכת</h5>
                </div>
                <div class="modal-body"></div>
            </div>
        </div>
    </div>

    <!-- Modal for Trivia Test -->
    <div class="modal fade" id="triviaModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false"
        aria-labelledby="triviaModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body">
                    <div class="header-container">
                        <p id="timer" class="text-start"></p>
                        <p id="testName" class="text-center"></p>
                        <p id="questionProgress" class="text-end"></p>
                    </div>
                    <div id="questionContainer">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var actions = ""
        var systemConfig
        var students = ""
        var tests = ""
        var currentStudent = ""
        var currentResult = "";
        var searchVal = ""
        var buffer = "";
        var fileName
        var tableName
        var isModalOpen = false;
        var questions
        var step
        const Steps = {
            step1: "1",
            step2: "2",
            step3: "3"
        };

        const questionContainer = document.getElementById('questionContainer');
        const questionProgress = document.getElementById('questionProgress');
        const testNameElement = document.getElementById('testName');
        const timerElement = document.getElementById('timer');
        let currentTable = "";
        let currentTest = null;
        let currentQuestionIndex = 0;
        let correctCount = 0;
        let timer;

        function onLoad() {
            step = Steps.step1;
            tableName = 'systemConfig'
            window.expose.sendSystem("sendReadSystem", tableName);
            window.expose.receiveSystem("receiveReadSystem" + tableName, (data) => {
                systemConfig = data
                document.getElementById("position").style.backgroundColor = getPosition(systemConfig.color)[0]
                document.getElementById("position").style.color = getPosition(systemConfig.color)[1]
                document.getElementById("background").style.backgroundImage = getBackground(systemConfig.device, systemConfig.color)
                document.querySelector(".text").style.color = getTextColor(systemConfig.textColor);

                if (systemConfig.numPosition.length > 0) {
                    document.getElementById("position").innerHTML += ' ' + systemConfig.numPosition
                }
                else {
                    document.getElementById("position").style.display = "none";
                }
                currentTable = systemConfig.buy ? 'products' : 'uniqTasks';
                if (systemConfig.buy) {
                    updateLines("שלום...!", "יש לבחור מתנה לקנייה")
                }
                else {
                    updateLines(" שלום...! ", "יש לבחור משימה לתיקוף ")
                }
                window.expose.receiveDbData("receiveGetDataByTable" + currentTable, (data) => {
                    if (Array.isArray(data) && data.length > 0) {
                        actions = data;
                        createCards();
                    }
                });
                window.expose.sendDbData("sendGetDataByTable", currentTable);
            });
        }

        document.addEventListener("keypress", function (e) {
            if (isModalOpen) return;
            document.activeElement.blur();
            if (e.key === "Enter") {
                if (buffer.length > 0) {
                    searchVal = buffer;
                    buffer = "";
                    if (step == Steps.step1) {
                        if (searchVal == '999999999')
                            login('../main/manage')
                        else if (searchVal == '011429519')
                            login('../main/system')
                        else {
                            showAlert("יש לבחור לפני התיקוף!");
                            return;
                        }
                    }
                    else if (step == Steps.step2) {
                        searchStudent();
                    }
                }
            } else {
                buffer += e.key;
            }
        });

        function createCards() {
            const cardContainer = document.getElementById("cards");

            actions.filter(item => item.show).forEach(cardData => {
                const cardColumn = document.createElement("div");
                cardColumn.classList.add("col");

                const cardElement = document.createElement("a");
                cardElement.classList.add("card", "focus-ring", "text-decoration-none", "rounded-2", "h-100");
                cardElement.addEventListener("click", function () {
                    selectAction(cardData);
                });
                cardElement.href = '#'

                const cardFooter = document.createElement("div");
                cardFooter.classList.add("card-footer", "h-10");

                const footerSmall = document.createElement("small");
                footerSmall.classList.add("text-body-secondary");
                footerSmall.textContent = cardData.points + ' נקודות'

                const cardBody = document.createElement("div");
                cardBody.classList.add("card-body");

                const cardTitle = document.createElement("h5");
                cardTitle.classList.add("card-title");
                cardTitle.textContent = cardData.name

                cardBody.appendChild(cardTitle);
                cardElement.appendChild(cardBody);
                cardFooter.appendChild(footerSmall)
                cardElement.appendChild(cardFooter);
                cardColumn.appendChild(cardElement);
                cardContainer.appendChild(cardColumn);
            });
        }

        function selectAction(cardData) {
            if (step != Steps.step3) {
                step = Steps.step2;
                
                currentResult = cardData;

                if(systemConfig.buy==1){
                    window.expose.sendDbData("sendIsProductUsed", currentResult.id);
                    window.expose.receiveDbData("receiveIsProductUsed", (isUsed) => {
                        if (isUsed) {
                            showAlert("הי, כרטיס זה כבר שומש!");
                            return;
                        }
                        updateLines("בחרת במתנה: " + currentResult.name, "")
                        updateLinesByDevice()
                    });
                    return
                }
                
                switch (currentResult.type) {
                    case 1: {
                    updateLines("בחרת ב: " + currentResult.name, "")
                    break;
                    }
                    case 2: {
                        updateLines("בחרת ב: " + currentResult.name, "")
                        openTest();
                        return;
                    }
                }
                updateLinesByDevice()
            }
        }
    
        //-------------tests-------------------//

        function openTest() {
            isModalOpen = true;
            document.getElementById("cards").style.display = "none"
            currentTest = tests.find(test => test.id == currentResult.code);
            currentQuestionIndex = 0;
            correctCount = 0;
            testNameElement.innerText = `${currentResult.name}`;
            questions = shuffleArray(currentTest.questions);
            displayQuestion();

            // Show Modal
            const triviaModal = new bootstrap.Modal(document.getElementById('triviaModal'));
            triviaModal.show();
        }
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]]; // Swap elements
            }
            return array;
        }


        function displayQuestion() {
            const questionData = questions[currentQuestionIndex];
            questionContainer.innerHTML = `
        <div class="mb-3">
          <p><strong>${questionData.question}</strong></p>
          ${questionData.answers.map((answer, i) => `
            <div class="answer-button" onclick="submitAnswer(${i})">${answer}</div>
          `).join('')}
        </div>
      `;
            questionProgress.innerText = `${currentQuestionIndex + 1}/${currentTest.questions.length}`;
            startTimer();
        }

        function startTimer() {
            let timeLeft = systemConfig.timer;
            timerElement.innerText = `זמן שנותר: ${timeLeft} שניות`;
            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                timerElement.innerText = `זמן שנותר: ${timeLeft} שניות`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    submitAnswer(-1); // Auto move to next question if no answer selected
                }
            }, 1000);
        }

        function submitAnswer(selectedIndex) {
            clearInterval(timer);
            if (selectedIndex === currentTest.questions[currentQuestionIndex].correctIndex) {
                correctCount++;
            }

            currentQuestionIndex++;

            if (currentQuestionIndex < currentTest.questions.length) {
                displayQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            isModalOpen = false;
            const score = correctCount * currentResult.points;
            updateLines("הציון שלך: " + score)
            updateLinesByDevice()
            currentResult.points = score;
            const triviaModalEl = document.getElementById('triviaModal');
            const triviaModal = bootstrap.Modal.getInstance(triviaModalEl);
            triviaModal.hide();
        }

        //---------------------------//

        function searchStudent() {
            document.getElementById("cards").style.display = "none";
            step = Steps.step3;

            window.expose.sendDbData("sendGetStudentById", searchVal);
            window.expose.receiveDbData("receiveGetStudentById", (student) => {
                currentStudent = student;
                if (currentStudent == null) {
                    showAlert("הברקוד לא מופיע ברשימות. גשו למורה!");
                    return;
                }
                if (!currentResult.multiple) {
                    window.expose.sendDbData("sendHasStudentDoneSelected", { currentStudent, currentResult });
                    window.expose.receiveDbData("receiveHasStudentDoneSelected", (alreadyDone) => {
                        if (alreadyDone){
                            showAlert("הי, משימה זו כבר תוקפה!");                            
                        }            
                        else
                            saveStudentData();
                    });
                }
                else {
                    saveStudentData();
                }
            })
        }

        async function saveStudentData() {
            if(systemConfig.buy==1){
                window.expose.sendDbData("sendSaveStudentProduct", { currentStudent, currentResult });
            } else{
                window.expose.sendDbData("sendSaveStudentTask", { currentStudent, currentResult });
            }
                window.expose.receiveDbData("receiveSaveStudentData", (points) => {
                if (points == false) {
                    showAlert(" אין לך מספיק נקודות בחשבון! ");                            
                    return;
                } else{
                    document.getElementById("background").style.backgroundImage = getBackground(systemConfig.device, systemConfig.color, step);
                    currentStudent.points = points;
                    updateLines("תודה רבה " + currentStudent.name, " כעת יש בחשבונך " + currentStudent.points + " נקודות", "בהצלחה!")

                    if (systemConfig.hasPrint == 1) {
                        setTimeout(function () {
                            toPrint();
                        }, 2000);
                    } else {
                        reset(2000);
                    }
                } 
            });
        }

        function toPrint() {
            const dynamicHTML = `
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="utf-8" />
            <title>Print</title>
            <style>
                body {
                    font-family: 'Arial', sans-serif;;
                    direction: rtl;
                    margin: 0;
                    padding: 0;
                }
                #title {
                    font-size: 40px;
                    text-align: center;
                }
                #content div {
                    font-size: 20px;
                    margin: 10px 0;
                }
                #footer {
                    font-size: 10px;
                    text-align: center;
                    margin-top: 20px;
                }
            </style>
        </head>
        <body>
            <div id="title">אישור</div>
            <br>
            <div id="content">
                <div>${currentStudent.name}</div>
                <div>${currentStudent.grade}</div>
                <div>${systemConfig.buy == 0
                    ? "" + currentResult.name
                    : "זכאות למתנה: " + currentResult.name}</div>
                <div>נקודות בחשבון: ${currentStudent.points}</div>
            </div>
            <br>
            <div id="title">בהצלחה!</div>
            <br>
            <br>
            <div id="footer">להזמנות: אפרת מלכה 0504167969 office@gammick.co.il</div>
        </body>
        </html>
    `;
            window.expose.send("sendPrint", dynamicHTML);
            window.expose.receive("receivePrint", () => {
                reset();
            });
        }

        function reset(time = 0) {
            setTimeout(function () {
                location.reload();
            }, time);
        }

        function updateLines(line1Text, line2Text, line3Text = "") {
            if (line1Text != "*")
                document.getElementById("line1").innerHTML = line1Text;
            document.getElementById("line2").innerHTML = line2Text;
            document.getElementById("line3").innerHTML = line3Text;
        }

        function updateLinesByDevice() {
            systemConfig.device == "2" ?
                updateLines("*", "יש להעביר את הכרטיס המגנטי") :
                systemConfig.device == "4" ?
                    updateLines("*", "יש לסרוק את הצ'יפ בקורא ") :
                    updateLines("*", "יש לסרוק את הברקוד האישי ")
        }

        function showAlert(message) {
            document.querySelector(".modal-body").innerHTML = message;
            $(document).ready(function () {
                $('#modal').modal('show')
            });
            setTimeout(function () {
                $(document).ready(function () {
                    $('#modal').modal('hide')
                });
                reset(0)
            }
                , 2500);
        }
    </script>

</body>

</html>
