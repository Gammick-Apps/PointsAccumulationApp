<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>פג תוקף</title>
</head>

<body onload="onLoad()">
    <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link href="../../styleSheets/mainStyleSheet.css" rel="stylesheet" />
    <link href="../../styleSheets/userStyleSheet.css" rel="stylesheet" />
    <script src="../../js/shared.js"></script>

    <script>
        var searchVal = ""

        function onLoad() {
           document.getElementById("background").style.backgroundImage = getBackground("1", "5");
            document.querySelector(".text").style.color = getTextColor("2");
        }
        document.addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                if (searchVal.length > 0) {
                    if (searchVal == '999999999')
                        login("manage")
                    if (searchVal == '011429519')
                        login("system")
                }
            } else {
                searchVal += e.key;
            }
        });

    </script>
    <div class="background" id="background">
        <div class="closeBtn">
            <img onclick="expose.appClose()" src="../../resources/barcode/x-light.svg" />
        </div>
        <div class="text">
            <div id="line1">...מצטערים</div>
            <div id="line2">!פג תוקף הרשיון</div>
        </div>
    </div>
</body>

</html>
