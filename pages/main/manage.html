<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>צבירת נקודות</title>
</head>

<body onload="onLoad()">
    <script src="../../js/shared.js"></script>
    <script>
        var systemConfig = ""
        var fileName

        function onLoad() {
            tableName = 'systemConfig'
            window.expose.SendExcel("sendReadSystem", tableName);
            window.expose.ReceiveExcel("receiveReadSystem" + tableName, (data) => {
                systemConfig = JSON.parse(data)
                if (systemConfig.device == 2 || systemConfig.device == 4 || systemConfig.device == 1 && (systemConfig.hasBuy == "1" || systemConfig.type=="2" ))
                    login("../magnetCard/manage")
                else if (systemConfig.device == 1)
                    login("../barcode/manage")

                else if (systemConfig.device == 3)
                    login("../digitalCard/manage")
            })
        }
    </script>

</html>
