<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>צבירת נקודות</title>
</head>

<body onload="onLoad()">
    <script src="../../js/shared.js"></script>
    <script>
        var systemConfig = ""
        var currentDate = getTodayDate();
        var tableName

        function onLoad() {
            tableName = 'systemConfig'
            window.expose.sendSystem("sendReadSystem", tableName);
            window.expose.receiveSystem("receiveReadSystem" + tableName, (data) => {
                systemConfig = JSON.parse(data)
                if (currentDate > systemConfig.date)
                    login('expired')
                else if (systemConfig.device == 2 || systemConfig.device == 4 || systemConfig.device == "1" && (systemConfig.type == "2" || systemConfig.buy == "1"))
                    login("../magnetCard/user")
                else if (systemConfig.device == 1)
                    login("../barcode/user")
                else if (systemConfig.device == 3)
                    login("../digitalCard/user")
            })
        }
    </script>

</html>
